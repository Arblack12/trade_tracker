{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'trades/css/dark_theme.css' %}">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            margin: 80px auto;
            padding: 20px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #222; /* slightly darker */
        }
        .login-container img {
            width: 120px;
            margin-bottom: 20px;
        }
        .login-container h1 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 12px;
            text-align: left;
            width: 100%;
        }
        .form-group label {
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 8px;
            background-color: #111; /* black-ish */
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
        }
        /* Remember me checkbox styling */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        .remember-me input[type="checkbox"] {
            accent-color: #000; /* black checkbox */
            width: 16px;
            height: 16px;
        }
        .login-button {
            display: block;
            margin: 10px auto 0 auto; /* center horizontally */
            background-color: #008c5f;
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-button:hover {
            background-color: #00a874;
        }
        a {
            color: #81d4f2;
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- RS3 Logo -->
    <img src="{% static 'images/rs3_logo.webp' %}" alt="RS3 Logo">

    <h1>Login</h1>
    <form method="POST">
        {% csrf_token %}
        
        <!-- Username -->
        <div class="form-group">
            <label for="id_username">Username</label><br>
            <input type="text" name="username" id="id_username" required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="id_password">Password</label><br>
            <input type="password" name="password" id="id_password" required>
        </div>

        <!-- Remember me -->
        <div class="remember-me">
            <input type="checkbox" id="remember_me" name="remember_me">
            <label for="remember_me">Remember me</label>
        </div>

        <!-- Login button -->
        <button type="submit" class="login-button">Login</button>
    </form>
    
    <p style="margin-top: 10px;">
        Don’t have an account? <a href="{% url 'trades:signup_view' %}">Sign up</a>
    </p>
</div>

</body>
</html>
